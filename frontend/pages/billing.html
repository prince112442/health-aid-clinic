<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billing — Health-Aid Clinic</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .invoice-box { max-width:720px; margin:0 auto; padding:36px; font-size:14px; }
    .inv-header { display:flex; justify-content:space-between; margin-bottom:28px; }
    .inv-brand h2 { font-size:20px; color:var(--brown-dark); }
    .inv-meta { text-align:right; }
    .inv-parties { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:24px; }
    .inv-party-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--text-light); margin-bottom:6px; }
    .inv-table th, .inv-table td { padding:10px 12px; }
    .inv-table thead th { background:var(--brown-cream); }
    .inv-totals { margin-top:16px; display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
    .inv-total-row { display:flex; gap:60px; font-size:13px; }
    .inv-total-row.grand { font-size:16px; font-weight:700; border-top:2px solid var(--brown-dark); padding-top:8px; margin-top:4px; }
    @media print {
      .sidebar, .topbar, .toolbar, .btn, .modal-overlay { display:none!important; }
      .main-content { margin-left:0; }
    }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-placeholder"></div>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" id="menu-toggle">☰</button>
        <div><div class="topbar-title">Billing</div></div>
      </div>
      <div class="topbar-right">
        <div class="topbar-date" id="topbar-date"></div>
        <button class="btn btn-primary" onclick="openAdd()">+ Generate Bill</button>
      </div>
    </div>

    <div class="page-content">
      <div class="toolbar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" class="form-control" id="search-input" placeholder="Search patient or bill ID...">
        </div>
        <select class="form-control" id="status-filter" style="width:auto">
          <option value="">All Statuses</option>
          <option>pending</option><option>paid</option><option>partial</option><option>cancelled</option>
        </select>
      </div>

      <div class="card">
        <div class="card-header"><span class="card-title">Invoices</span></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Bill ID</th><th>Patient</th><th>Date</th><th>Total</th><th>Paid</th><th>Balance</th><th>Method</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="bills-table"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Create Bill Modal -->
<div class="modal-overlay" id="bill-modal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Generate Bill</span>
      <button class="modal-close" onclick="Modal.close('bill-modal')">×</button>
    </div>
    <div class="modal-body">
      <form id="bill-form">
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Patient Name <span class="req">*</span></label>
            <input type="text" name="patientName" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label">Patient DB ID</label>
            <input type="text" name="patientId" class="form-control" placeholder="MongoDB patient _id">
          </div>
        </div>

        <div style="margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <strong>Bill Items</strong>
            <button type="button" class="btn btn-sm btn-secondary" onclick="addBillRow()">+ Add Item</button>
          </div>
          <table style="width:100%;font-size:13px">
            <thead><tr style="background:var(--brown-cream)"><th style="padding:8px">Description</th><th style="padding:8px">Qty</th><th style="padding:8px">Unit Price</th><th style="padding:8px">Total</th><th></th></tr></thead>
            <tbody id="bill-items"></tbody>
          </table>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Tax (%)</label>
            <input type="number" name="tax" id="tax-input" class="form-control" value="0" min="0" max="100" oninput="calcTotal()">
          </div>
          <div class="form-group">
            <label class="form-label">Discount (GH₵)</label>
            <input type="number" name="discount" id="discount-input" class="form-control" value="0" min="0" oninput="calcTotal()">
          </div>
        </div>

        <div style="text-align:right;padding:12px;background:var(--brown-cream);border-radius:8px;margin-bottom:14px">
          <div style="font-size:13px;color:var(--text-light)">Subtotal: <strong id="subtotal-display">GH₵ 0.00</strong></div>
          <div style="font-size:18px;font-weight:700;color:var(--brown-dark)">Total: <span id="total-display">GH₵ 0.00</span></div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Payment Status</label>
            <select name="paymentStatus" class="form-control" onchange="togglePaid(this.value)">
              <option value="pending">Pending</option><option value="paid">Paid</option>
              <option value="partial">Partial</option><option value="cancelled">Cancelled</option>
            </select>
          </div>
          <div class="form-group" id="method-group">
            <label class="form-label">Payment Method</label>
            <select name="paymentMethod" class="form-control">
              <option value="">—</option><option value="cash">Cash</option>
              <option value="card">Card</option><option value="mobile_money">Mobile Money</option>
              <option value="insurance">Insurance</option>
            </select>
          </div>
          <div class="form-group" id="paid-group">
            <label class="form-label">Amount Paid (GH₵)</label>
            <input type="number" name="amountPaid" class="form-control" value="0" min="0" step="0.01">
          </div>
          <div class="form-group">
            <label class="form-label">Notes</label>
            <input type="text" name="notes" class="form-control">
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="Modal.close('bill-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveBill()">💾 Generate Bill</button>
    </div>
  </div>
</div>

<!-- Invoice Print Modal -->
<div class="modal-overlay" id="invoice-modal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <span class="modal-title">Invoice</span>
      <button class="modal-close" onclick="Modal.close('invoice-modal')">×</button>
    </div>
    <div class="modal-body" id="invoice-body"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="Modal.close('invoice-modal')">Close</button>
      <button class="btn btn-primary" onclick="window.print()">🖨️ Print Invoice</button>
    </div>
  </div>
</div>

<script src="/js/sidebar.js"></script>
<script src="/js/app.js"></script>
<script>
renderSidebar('billing');
let editId = null, billRows = [];

function addBillRow() {
  const id = Date.now();
  billRows.push(id);
  const tbody = document.getElementById('bill-items');
  const tr = document.createElement('tr');
  tr.id = `row-${id}`;
  tr.innerHTML = `
    <td><input type="text" class="form-control form-control-sm" placeholder="Service/Item" onchange="calcTotal()" style="min-width:180px" id="desc-${id}"></td>
    <td><input type="number" class="form-control form-control-sm" value="1" min="1" style="width:70px" id="qty-${id}" oninput="calcRowTotal(${id})"></td>
    <td><input type="number" class="form-control form-control-sm" value="0" min="0" step="0.01" style="width:110px" id="price-${id}" oninput="calcRowTotal(${id})"></td>
    <td id="total-${id}" style="font-weight:600;padding:0 8px">0.00</td>
    <td><button type="button" class="btn btn-icon btn-danger btn-sm" onclick="removeRow(${id})">×</button></td>`;
  tbody.appendChild(tr);
}

function calcRowTotal(id) {
  const qty = parseFloat(document.getElementById(`qty-${id}`)?.value) || 0;
  const price = parseFloat(document.getElementById(`price-${id}`)?.value) || 0;
  const total = qty * price;
  const el = document.getElementById(`total-${id}`);
  if (el) el.textContent = total.toFixed(2);
  calcTotal();
}

function removeRow(id) {
  document.getElementById(`row-${id}`)?.remove();
  billRows = billRows.filter(x => x !== id);
  calcTotal();
}

function calcTotal() {
  const subtotal = billRows.reduce((s, id) => {
    const qty = parseFloat(document.getElementById(`qty-${id}`)?.value) || 0;
    const price = parseFloat(document.getElementById(`price-${id}`)?.value) || 0;
    return s + qty * price;
  }, 0);
  const tax = parseFloat(document.getElementById('tax-input')?.value) || 0;
  const discount = parseFloat(document.getElementById('discount-input')?.value) || 0;
  const total = subtotal + (subtotal * tax / 100) - discount;
  document.getElementById('subtotal-display').textContent = `GH₵ ${subtotal.toFixed(2)}`;
  document.getElementById('total-display').textContent = `GH₵ ${total.toFixed(2)}`;
}

function getItems() {
  return billRows.map(id => ({
    description: document.getElementById(`desc-${id}`)?.value || '',
    quantity: parseFloat(document.getElementById(`qty-${id}`)?.value) || 1,
    unitPrice: parseFloat(document.getElementById(`price-${id}`)?.value) || 0,
    total: (parseFloat(document.getElementById(`qty-${id}`)?.value)||1) * (parseFloat(document.getElementById(`price-${id}`)?.value)||0)
  })).filter(i => i.description);
}

function togglePaid(val) {
  const pg = document.getElementById('paid-group');
  const mg = document.getElementById('method-group');
  const show = val === 'paid' || val === 'partial';
  pg.style.display = show ? '' : 'none';
  mg.style.display = show ? '' : 'none';
}

function openAdd() {
  editId = null; billRows = [];
  document.getElementById('modal-title').textContent = 'Generate Bill';
  document.getElementById('bill-form').reset();
  document.getElementById('bill-items').innerHTML = '';
  document.getElementById('subtotal-display').textContent = 'GH₵ 0.00';
  document.getElementById('total-display').textContent = 'GH₵ 0.00';
  addBillRow();
  Modal.open('bill-modal');
}

async function saveBill() {
  const form = document.getElementById('bill-form');
  if (!form.checkValidity()) { form.reportValidity(); return; }
  const data = getFormData(form);
  const items = getItems();
  if (!items.length) { Toast.warning('Add at least one item'); return; }
  if (!data.patientId || !data.patientId.match(/^[a-f0-9]{24}$/i)) {
    data.patientId = '000000000000000000000000';
  }
  const subtotal = items.reduce((s, i) => s + i.total, 0);
  const tax = parseFloat(data.tax) || 0;
  const discount = parseFloat(data.discount) || 0;
  data.items = items; data.subtotal = subtotal;
  data.total = subtotal + (subtotal * tax / 100) - discount;
  try {
    await API.post('/billing', data);
    Toast.success('Bill generated');
    Modal.close('bill-modal');
    loadBills();
  } catch(e) { Toast.error(e.message); }
}

async function loadBills() {
  const search = document.getElementById('search-input').value;
  const status = document.getElementById('status-filter').value;
  try {
    const bills = await API.get(`/billing?search=${encodeURIComponent(search)}&status=${status}`);
    const tbody = document.getElementById('bills-table');
    if (!bills.length) {
      tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state"><div class="icon">🧾</div><h3>No bills found</h3></div></td></tr>';
      return;
    }
    tbody.innerHTML = bills.map(b => {
      const balance = b.total - (b.amountPaid || 0);
      return `<tr>
        <td><code>${b.billId}</code></td>
        <td><strong>${b.patientName}</strong></td>
        <td>${Fmt.date(b.createdAt)}</td>
        <td>${Fmt.currency(b.total)}</td>
        <td>${Fmt.currency(b.amountPaid || 0)}</td>
        <td style="color:${balance > 0 ? 'var(--danger)' : 'var(--success)'}">${Fmt.currency(balance)}</td>
        <td>${b.paymentMethod || '—'}</td>
        <td>${Fmt.badge(b.paymentStatus, statusBadge)}</td>
        <td>
          <button class="btn btn-sm btn-secondary" onclick="viewInvoice('${b._id}')">👁 Invoice</button>
          <button class="btn btn-sm btn-success" onclick="markPaid('${b._id}')">✅ Mark Paid</button>
        </td>
      </tr>`;
    }).join('');
  } catch(e) { Toast.error('Failed to load bills'); }
}

async function viewInvoice(id) {
  try {
    const b = await API.get(`/billing/${id}`);
    document.getElementById('invoice-body').innerHTML = `
      <div class="invoice-box">
        <div class="inv-header">
          <div class="inv-brand"><h2>🏥 HEALTH-AID CLINIC</h2><p style="color:var(--text-light);font-size:12px">Hospital Management System</p></div>
          <div class="inv-meta">
            <div style="font-size:22px;font-weight:700;color:var(--brown-mid)">INVOICE</div>
            <div><strong>${b.billId}</strong></div>
            <div style="font-size:12px;color:var(--text-light)">${Fmt.date(b.createdAt)}</div>
          </div>
        </div>
        <div class="inv-parties">
          <div><div class="inv-party-label">Billed To</div><div style="font-weight:600">${b.patientName}</div></div>
          <div><div class="inv-party-label">Status</div>${Fmt.badge(b.paymentStatus, statusBadge)}</div>
        </div>
        <table class="inv-table" style="width:100%;border-collapse:collapse">
          <thead><tr><th style="text-align:left">Description</th><th>Qty</th><th>Unit Price</th><th>Total</th></tr></thead>
          <tbody>${b.items.map(i => `<tr><td style="padding:10px 12px">${i.description}</td><td style="padding:10px 12px;text-align:center">${i.quantity}</td><td style="padding:10px 12px;text-align:right">${Fmt.currency(i.unitPrice)}</td><td style="padding:10px 12px;text-align:right">${Fmt.currency(i.total)}</td></tr>`).join('')}</tbody>
        </table>
        <div class="inv-totals">
          <div class="inv-total-row"><span>Subtotal</span><span>${Fmt.currency(b.subtotal)}</span></div>
          ${b.tax ? `<div class="inv-total-row"><span>Tax (${b.tax}%)</span><span>${Fmt.currency(b.subtotal * b.tax/100)}</span></div>` : ''}
          ${b.discount ? `<div class="inv-total-row"><span>Discount</span><span>- ${Fmt.currency(b.discount)}</span></div>` : ''}
          <div class="inv-total-row grand"><span>TOTAL</span><span>${Fmt.currency(b.total)}</span></div>
          <div class="inv-total-row"><span>Amount Paid</span><span>${Fmt.currency(b.amountPaid || 0)}</span></div>
        </div>
        ${b.notes ? `<p style="margin-top:20px;font-size:12px;color:var(--text-light)">Notes: ${b.notes}</p>` : ''}
      </div>`;
    Modal.open('invoice-modal');
  } catch(e) { Toast.error('Failed to load invoice'); }
}

async function markPaid(id) {
  if (!confirm('Mark this bill as fully paid?')) return;
  try {
    const b = await API.get(`/billing/${id}`);
    await API.put(`/billing/${id}`, { paymentStatus: 'paid', amountPaid: b.total, paymentMethod: b.paymentMethod || 'cash' });
    Toast.success('Marked as paid'); loadBills();
  } catch(e) { Toast.error(e.message); }
}

['search-input','status-filter'].forEach(id => {
  document.getElementById(id)?.addEventListener('input', loadBills);
  document.getElementById(id)?.addEventListener('change', loadBills);
});
loadBills();
</script>
</body>
</html>

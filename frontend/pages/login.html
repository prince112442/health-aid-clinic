<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Health-Aid Clinic</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: var(--brown-cream); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-wrap { width: 100%; max-width: 420px; padding: 20px; }
    .login-card { background: var(--white); border-radius: 18px; box-shadow: 0 8px 40px rgba(61,43,31,.15); overflow: hidden; }
    .login-header { background: var(--brown-dark); padding: 36px 32px 28px; text-align: center; }
    .login-header .logo { font-size: 48px; margin-bottom: 10px; }
    .login-header h1 { font-family: 'Playfair Display', serif; color: var(--white); font-size: 20px; line-height: 1.2; margin-bottom: 4px; }
    .login-header p { color: var(--brown-pale); font-size: 12px; }
    .login-body { padding: 32px; }
    .login-body .form-label { font-weight: 600; }
    .login-body .form-control { padding: 12px 14px; font-size: 14px; }
    .login-btn { width: 100%; padding: 13px; font-size: 15px; font-weight: 600; border-radius: 10px; margin-top: 8px; }
    .login-footer { text-align: center; padding: 16px 32px 28px; color: var(--text-light); font-size: 12px; }
    .error-msg { display: none; }
  </style>
</head>

        <h1>HEALTH-AID CLINIC</h1>
        <p>Hospital Management System</p>
      </div>
      <div class="login-body">
        <div class="alert alert-danger error-msg" id="error-msg">Invalid username or password.</div>
        <form id="login-form">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
          </div>
          <button type="submit" class="btn btn-primary login-btn" id="login-btn">Sign In</button>
        </form>
      </div>
      <div class="login-footer">
        &copy; 2025 Health-Aid Clinic. All rights reserved.
      </div>
    </div>
  </div>

  <script>
    // Auto-run setup on first load
    const API_BASE = 'https://health-aid-clinic.onrender.com/api';
    fetch(`${API_BASE}/auth/setup`, { method: 'POST', headers: { 'Content-Type': 'application/json' } }).catch(() => {});

    // Redirect if already logged in
    if (localStorage.getItem('token')) window.location.href = '/pages/dashboard.html';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';
      btn.textContent = 'Signing in...'; btn.disabled = true;

      const body = { username: e.target.username.value, password: e.target.password.value };
      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/pages/dashboard.html';
      } catch (err) {
        errEl.textContent = err.message || 'Invalid credentials';
        errEl.style.display = 'flex';
        btn.textContent = 'Sign In'; btn.disabled = false;
      }
    });
  </script>

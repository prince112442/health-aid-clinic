<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pharmacy — Health-Aid Clinic</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar-placeholder"></div>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" id="menu-toggle">☰</button>
        <div><div class="topbar-title">Pharmacy</div></div>
      </div>
      <div class="topbar-right">
        <div class="topbar-date" id="topbar-date"></div>
        <button class="btn btn-primary" onclick="openAdd()">+ Add Drug</button>
      </div>
    </div>

    <div class="page-content">
      <!-- Summary -->
      <div class="stats-grid" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr));margin-bottom:22px">
        <div class="stat-card"><div class="stat-icon brown">💊</div><div class="stat-info"><div class="label">Total Drugs</div><div class="value" id="s-total">—</div></div></div>
        <div class="stat-card"><div class="stat-icon red">⚠️</div><div class="stat-info"><div class="label">Low Stock</div><div class="value" id="s-low">—</div></div></div>
        <div class="stat-card"><div class="stat-icon orange">📦</div><div class="stat-info"><div class="label">Out of Stock</div><div class="value" id="s-out">—</div></div></div>
      </div>

      <div class="toolbar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" class="form-control" id="search-input" placeholder="Search drug name or category...">
        </div>
        <label style="display:flex;align-items:center;gap:7px;font-size:13px;cursor:pointer">
          <input type="checkbox" id="low-stock-filter"> Show low stock only
        </label>
      </div>

      <div class="card">
        <div class="card-header"><span class="card-title">Drug Inventory</span></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Drug ID</th><th>Name</th><th>Category</th><th>Qty</th><th>Unit</th><th>Selling Price</th><th>Expiry</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="drugs-table"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="drug-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Add Drug</span>
      <button class="modal-close" onclick="Modal.close('drug-modal')">×</button>
    </div>
    <div class="modal-body">
      <form id="drug-form">
        <div class="form-grid">
          <div class="form-group col-span-2">
            <label class="form-label">Drug Name <span class="req">*</span></label>
            <input type="text" name="name" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label">Category</label>
            <input type="text" name="category" class="form-control" placeholder="e.g. Antibiotic">
          </div>
          <div class="form-group">
            <label class="form-label">Manufacturer</label>
            <input type="text" name="manufacturer" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">Quantity <span class="req">*</span></label>
            <input type="number" name="quantity" class="form-control" min="0" required>
          </div>
          <div class="form-group">
            <label class="form-label">Unit</label>
            <select name="unit" class="form-control">
              <option value="pcs">pcs</option><option value="pack">pack</option>
              <option value="bottle">bottle</option><option value="box">box</option>
              <option value="vial">vial</option><option value="tube">tube</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Cost Price (GH₵)</label>
            <input type="number" name="costPrice" class="form-control" min="0" step="0.01">
          </div>
          <div class="form-group">
            <label class="form-label">Selling Price (GH₵)</label>
            <input type="number" name="sellingPrice" class="form-control" min="0" step="0.01">
          </div>
          <div class="form-group">
            <label class="form-label">Low Stock Threshold</label>
            <input type="number" name="lowStockThreshold" class="form-control" min="1" value="10">
          </div>
          <div class="form-group">
            <label class="form-label">Expiry Date</label>
            <input type="date" name="expiryDate" class="form-control">
          </div>
          <div class="form-group col-span-2">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control" rows="2"></textarea>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="Modal.close('drug-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveDrug()">💾 Save</button>
    </div>
  </div>
</div>

<!-- Restock Modal -->
<div class="modal-overlay" id="restock-modal">
  <div class="modal" style="max-width:360px">
    <div class="modal-header">
      <span class="modal-title">Restock Drug</span>
      <button class="modal-close" onclick="Modal.close('restock-modal')">×</button>
    </div>
    <div class="modal-body">
      <p id="restock-name" style="font-weight:600;margin-bottom:16px"></p>
      <div class="form-group">
        <label class="form-label">Quantity to Add <span class="req">*</span></label>
        <input type="number" id="restock-qty" class="form-control" min="1" value="1">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="Modal.close('restock-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="confirmRestock()">📦 Restock</button>
    </div>
  </div>
</div>

<script src="/js/sidebar.js"></script>
<script src="/js/app.js"></script>
<script>
renderSidebar('pharmacy');
let editId = null, restockId = null;

async function loadDrugs() {
  const search = document.getElementById('search-input').value;
  const lowStock = document.getElementById('low-stock-filter').checked;
  try {
    const drugs = await API.get(`/pharmacy?search=${encodeURIComponent(search)}&lowStock=${lowStock}`);
    const total = drugs.length;
    const low = drugs.filter(d => d.quantity <= d.lowStockThreshold && d.quantity > 0).length;
    const out = drugs.filter(d => d.quantity === 0).length;
    document.getElementById('s-total').textContent = total;
    document.getElementById('s-low').textContent = low;
    document.getElementById('s-out').textContent = out;

    const tbody = document.getElementById('drugs-table');
    if (!drugs.length) {
      tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state"><div class="icon">💊</div><h3>No drugs found</h3></div></td></tr>';
      return;
    }
    tbody.innerHTML = drugs.map(d => {
      const isLow = d.quantity <= d.lowStockThreshold;
      const isOut = d.quantity === 0;
      const status = isOut ? '<span class="badge badge-danger">Out of Stock</span>' : isLow ? '<span class="badge badge-warning">Low Stock</span>' : '<span class="badge badge-success">In Stock</span>';
      return `<tr class="${isLow ? 'low-stock' : ''}">
        <td><code>${d.drugId}</code></td>
        <td><strong>${d.name}</strong></td>
        <td>${d.category || '—'}</td>
        <td><strong>${d.quantity}</strong></td>
        <td>${d.unit}</td>
        <td>${Fmt.currency(d.sellingPrice)}</td>
        <td>${d.expiryDate ? Fmt.date(d.expiryDate) : '—'}</td>
        <td>${status}</td>
        <td>
          <button class="btn btn-sm btn-success" onclick="openRestock('${d._id}','${d.name}')">+📦</button>
          <button class="btn btn-sm btn-secondary" onclick="editDrug('${d._id}')">✏️</button>
          <button class="btn btn-sm btn-danger" onclick="deleteDrug('${d._id}','${d.name}')">🗑</button>
        </td>
      </tr>`;
    }).join('');
  } catch(e) { Toast.error('Failed to load pharmacy data'); }
}

function openAdd() {
  editId = null;
  document.getElementById('modal-title').textContent = 'Add Drug';
  document.getElementById('drug-form').reset();
  Modal.open('drug-modal');
}

async function editDrug(id) {
  try {
    const drugs = await API.get('/pharmacy');
    const d = drugs.find(x => x._id === id);
    if (!d) return;
    editId = id;
    document.getElementById('modal-title').textContent = 'Edit Drug';
    fillForm(document.getElementById('drug-form'), d);
    Modal.open('drug-modal');
  } catch(e) { Toast.error('Failed to load drug'); }
}

async function saveDrug() {
  const form = document.getElementById('drug-form');
  if (!form.checkValidity()) { form.reportValidity(); return; }
  const data = getFormData(form);
  try {
    if (editId) { await API.put(`/pharmacy/${editId}`, data); Toast.success('Drug updated'); }
    else { await API.post('/pharmacy', data); Toast.success('Drug added'); }
    Modal.close('drug-modal');
    loadDrugs();
  } catch(e) { Toast.error(e.message); }
}

async function deleteDrug(id, name) {
  if (!window.confirm(`Delete drug "${name}"?`)) return;
  try { await API.delete(`/pharmacy/${id}`); Toast.success('Deleted'); loadDrugs(); }
  catch(e) { Toast.error(e.message); }
}

function openRestock(id, name) {
  restockId = id;
  document.getElementById('restock-name').textContent = name;
  document.getElementById('restock-qty').value = 1;
  Modal.open('restock-modal');
}

async function confirmRestock() {
  const qty = document.getElementById('restock-qty').value;
  if (!qty || qty < 1) { Toast.warning('Enter valid quantity'); return; }
  try {
    await API.patch(`/pharmacy/${restockId}/restock`, { quantity: qty });
    Toast.success('Restocked successfully');
    Modal.close('restock-modal');
    loadDrugs();
  } catch(e) { Toast.error(e.message); }
}

document.getElementById('search-input').addEventListener('input', loadDrugs);
document.getElementById('low-stock-filter').addEventListener('change', loadDrugs);
loadDrugs();
</script>
</body>
</html>
